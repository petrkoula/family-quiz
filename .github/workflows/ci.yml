name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: vue-app/yarn.lock

      - name: Install dependencies
        working-directory: ./vue-app
        run: yarn install --frozen-lockfile

      - name: Run Prettier check
        working-directory: ./vue-app
        run: yarn format:check

      - name: Run tests
        working-directory: ./vue-app
        run: yarn test

      - name: Build application
        working-directory: ./vue-app
        run: yarn build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build development image
        uses: docker/build-push-action@v4
        with:
          context: ./vue-app
          file: ./vue-app/Dockerfile.dev
          push: false
          tags: family-quiz:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build production image
        uses: docker/build-push-action@v4
        with:
          context: ./vue-app
          file: ./vue-app/Dockerfile
          push: false
          tags: family-quiz:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test production image
        run: |
          docker run -d -p 8080:80 --name quiz-test family-quiz:latest
          sleep 5
          curl -f http://localhost:8080 || exit 1
          docker stop quiz-test
